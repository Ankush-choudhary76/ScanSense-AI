<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScanSense AI</title>
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Outfit', 'sans-serif'],
          },
          colors: {
            border: 'var(--border)',
            input: 'var(--input)',
            ring: 'var(--ring)',
            background: 'hsl(var(--background))',
            foreground: 'hsl(var(--foreground))',
            primary: {
              DEFAULT: 'hsl(var(--primary))',
              foreground: 'hsl(var(--primary-foreground))'
            },
            secondary: {
              DEFAULT: 'hsl(var(--secondary))',
              foreground: 'hsl(var(--secondary-foreground))'
            },
            destructive: {
              DEFAULT: 'hsl(var(--destructive))',
              foreground: 'hsl(var(--destructive-foreground))'
            },
            muted: {
              DEFAULT: 'hsl(var(--muted))',
              foreground: 'hsl(var(--muted-foreground))'
            },
            accent: {
              DEFAULT: 'hsl(var(--accent))',
              foreground: 'hsl(var(--accent-foreground))'
            },
            card: {
              DEFAULT: 'hsl(var(--card))',
              foreground: 'hsl(var(--card-foreground))'
            },
            sidebar: {
              DEFAULT: 'hsl(var(--sidebar-background))',
              foreground: 'hsl(var(--sidebar-foreground))'
            },
            chat: {
              user: 'hsl(var(--chat-user))',
              'user-foreground': 'hsl(var(--chat-user-foreground))',
              ai: 'hsl(var(--chat-ai))',
              'ai-foreground': 'hsl(var(--chat-ai-foreground))'
            }
          }
        }
      }
    }
  </script>
  <!-- Custom Styles -->
  <link rel="stylesheet" href="styles.css" />
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="flex h-screen w-full overflow-hidden bg-background">
  <!-- Desktop Sidebar -->
  <div id="desktop-sidebar" style="width:256px; min-width:256px; transition: width 0.25s ease, opacity 0.25s ease, min-width 0.25s ease;" class="hidden lg:flex flex-col bg-sidebar h-full border-r border-border/50 overflow-hidden">
    <!-- Header -->
    <div class="flex items-center justify-between px-4 py-3">
      <div class="flex items-center gap-2">
        <img src="/logo1.png" alt="ScanSense AI" class="h-6 w-auto object-contain" />
        <span class="font-display text-sm font-semibold text-foreground">ScanSense AI</span>
      </div>
    </div>
    <!-- New Chat -->
    <div class="p-3">
      <button id="btn-new-chat-desktop" class="flex w-full items-center gap-2 rounded-lg bg-background px-3 py-2.5 text-sm font-medium text-foreground hover:bg-muted transition-colors shadow-sm border border-border/50">
        <i data-lucide="plus" class="h-4 w-4"></i> New Chat
      </button>
    </div>
    <!-- Chat List -->
    <div class="flex-1 overflow-y-auto scrollbar-thin px-3 pb-3">
      <p class="mb-2 px-2 text-xs font-medium text-muted-foreground uppercase tracking-wider">History</p>
      <div id="chat-list-desktop" class="space-y-1">
        <!-- Rendered dynamically -->
      </div>
    </div>
  </div>

  <!-- Mobile Sidebar Overlay (Hidden by default) -->
  <div id="mobile-sidebar-container" class="fixed inset-0 z-50 lg:hidden hidden">
    <div id="mobile-sidebar-backdrop" class="absolute inset-0 bg-background/80 backdrop-blur-sm"></div>
    <div class="relative z-10 w-64 h-full flex flex-col bg-sidebar transition-all border-r border-border/50">
      <div class="flex items-center justify-between px-4 py-3">
        <div class="flex items-center gap-2">
          <img src="/logo1.png" alt="ScanSense AI" class="h-6 w-auto object-contain" />
          <span class="font-display text-sm font-semibold text-foreground">ScanSense AI</span>
        </div>
        <button id="btn-close-sidebar" class="text-muted-foreground hover:text-foreground transition-colors lg:hidden">
          <i data-lucide="panel-left-close" class="h-5 w-5"></i>
        </button>
      </div>
      <div class="p-3">
        <button id="btn-new-chat-mobile" class="flex w-full items-center gap-2 rounded-lg bg-background px-3 py-2.5 text-sm font-medium text-foreground hover:bg-muted transition-colors shadow-sm border border-border/50">
          <i data-lucide="plus" class="h-4 w-4"></i> New Chat
        </button>
      </div>
      <div class="flex-1 overflow-y-auto scrollbar-thin px-3 pb-3">
        <p class="mb-2 px-2 text-xs font-medium text-muted-foreground uppercase tracking-wider">History</p>
        <div id="chat-list-mobile" class="space-y-1">
          <!-- Rendered dynamically -->
        </div>
      </div>
    </div>
  </div>

  <!-- Main Area -->
  <div class="flex flex-1 flex-col min-w-0 h-full">
    <!-- Top bar -->
    <header class="flex h-14 items-center justify-between px-4 shrink-0">
      <button id="btn-toggle-sidebar" class="flex h-9 w-9 items-center justify-center rounded-lg text-muted-foreground hover:text-foreground hover:bg-muted transition-colors shrink-0">
        <i data-lucide="panel-left" class="h-5 w-5"></i>
      </button>
      <button id="btn-theme-toggle" class="flex h-9 w-9 items-center justify-center rounded-lg text-muted-foreground hover:text-foreground hover:bg-muted transition-colors shrink-0">
        <i id="theme-icon" data-lucide="sun" class="h-5 w-5 hover:rotate-12 transition-transform"></i>
      </button>
    </header>

    <!-- Chat Window Container -->
    <div class="flex flex-1 flex-col h-[calc(100vh-3rem)]">
      <!-- Messages List -->
      <div id="messages-container" class="flex-1 overflow-y-auto scrollbar-thin px-4 py-6">
        <!-- Rendered dynamically -->
      </div>

      <!-- Input Box Container -->
      <div class="bg-transparent px-4 py-6 shrink-0 w-full max-w-5xl mx-auto">
        <div class="relative">
          <!-- Uploaded files preview -->
          <div id="files-preview-container" class="mb-3 flex flex-wrap gap-2 empty:hidden"></div>

          <!-- Input Area -->
          <div class="flex items-end gap-2 rounded-[24px] bg-muted px-4 py-3 transition-all focus-within:ring-2 focus-within:ring-foreground/20">
            <button id="btn-attach" class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full text-muted-foreground hover:text-foreground hover:bg-foreground/5 transition-colors" title="Attach files">
              <i data-lucide="paperclip" class="h-4 w-4"></i>
            </button>
            <input type="file" id="file-input" accept=".pdf,.jpg,.jpeg,.png,.jpe,.webp,.bmp,.gif,.tiff,.doc,.docx" multiple class="hidden" />

            <textarea id="chat-textarea" placeholder="Ask anything" rows="1" class="flex-1 resize-none bg-transparent text-[15px] text-foreground placeholder:text-muted-foreground outline-none py-1.5 max-h-40 overflow-y-auto leading-relaxed"></textarea>

            <button id="btn-send" class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-foreground text-background hover:opacity-80 disabled:opacity-40 disabled:cursor-not-allowed disabled:pointer-events-none transition-opacity ml-1">
              <i data-lucide="send" class="h-4 w-4"></i>
            </button>
          </div>
          <p class="mt-3 text-center text-xs text-muted-foreground opacity-70">
            ScanSense AI can make mistakes. Verify important information.
          </p>
        </div>
      </div>
    </div>
  </div>

  <!-- Main logic -->
  <script src="app.js?v=4"></script>
</body>
</html>
